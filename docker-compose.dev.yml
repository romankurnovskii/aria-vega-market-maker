services:
  market-maker:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    image: aria-vega-market-maker:dev
    command: sh -c "npx tsc -b && (npx tsc -b --watch & node --watch --enable-source-maps apps/engine/dist/main.js)"
    env_file: .env
    ports:
      - '8441:3000'
    volumes:
      # Bind mounts for hot reload
      - ./apps/engine/src:/app/apps/engine/src
      - ./packages:/app/packages
      - ./data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "import('http').then(http => http.get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: lp-frontend:dev
    command: pnpm --filter @lp-system/frontend run dev
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8441
    ports:
      - '8442:3000'
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
    restart: unless-stopped

networks:
  default:
    name: aria-vega-dev
